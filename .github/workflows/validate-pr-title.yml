name: Validate PR title

on:
  workflow_call:
    secrets:
      NIMBLE_GH_APP_ID:
        required: true
      NIMBLE_GH_APP_PRIVATE_KEY:
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.NIMBLE_GH_APP_ID }}
          private-key: ${{ secrets.NIMBLE_GH_APP_PRIVATE_KEY }}

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            refactor
          requireScope: true
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject must start with a lowercase letter.
            Example: "feat(AT-2287): mobile devices structure"
